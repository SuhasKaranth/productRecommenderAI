# Development profile — overrides for local development only.
# Activated by: SPRING_PROFILES_ACTIVE=dev (or spring.profiles.active=dev in .env)
# These defaults are intentionally NOT present in application.yml so that
# production startup fails fast when required env vars are missing.

spring:
  datasource:
    username: postgres
    password: postgres

security:
  api-key:
    enabled: false

logging:
  level:
    com.smartguide.poc: DEBUG
    org.hibernate.SQL: DEBUG
