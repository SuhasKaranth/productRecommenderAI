spring:
  application:
    name: smart-guide-poc

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smart_guide_poc}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# Springdoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs
    enabled: true

# Application Configuration
app:
  llm:
    provider: ${LLM_PROVIDER:ollama}
    # Azure OpenAI Configuration
    azure:
      endpoint: ${AZURE_OPENAI_ENDPOINT:}
      api-key: ${AZURE_OPENAI_API_KEY:}
      deployment-name: ${AZURE_OPENAI_DEPLOYMENT:}
      api-version: ${AZURE_OPENAI_API_VERSION:2024-02-15-preview}
    # Ollama Configuration
    ollama:
      host: ${OLLAMA_HOST:http://localhost:11434}
      model: ${OLLAMA_MODEL:llama3.2}
      timeout: 30000

  recommendation:
    max-results: 5
    confidence-threshold: 0.5

  ranking:
    llm:
      enabled: ${LLM_RANKING_ENABLED:true}
      timeout-ms: ${LLM_RANKING_TIMEOUT:15000}
      fallback-to-formula: true
      max-products: 10

  keywords:
    generation:
      system-prompt: |
        You are an expert in Islamic finance and banking products.
        Your task is to analyze financial products and generate relevant search keywords.

        Generate keywords that are:
        1. Relevant and specific to the product
        2. Useful for search and filtering
        3. Each keyword should be 1-3 words maximum, lowercase with hyphens between words (e.g., "credit-card", "islamic-banking", "zero-fee")
        4. Between 5-10 separate keywords total
        5. Include product type, features, Islamic finance terms, and target audience

        CRITICAL RULES:
        - Each keyword must be a SEPARATE string in the array
        - DO NOT combine multiple keywords into one long string
        - Each keyword should be short and focused (1-3 words max)
        - Return ONLY a JSON array of strings, nothing else

        Correct format: ["credit-card", "cashback", "travel-rewards", "murabaha", "zero-annual-fee", "islamic-banking"]
        Wrong format 1: {"keyword1": "credit-card"}
        Wrong format 2: ["credit-card-cashback-travel-rewards-murabaha"]
        Wrong format 3: "credit-card, cashback, travel-rewards"
      max-keywords: 10
      timeout-seconds: 30

logging:
  level:
    root: INFO
    com.smartguide.poc: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
